<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Pet Store</title>
    <link rel="stylesheet" href="styles.css">

<body>

<header>
    <h1>Pet Store</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>

        <a href="contato.html">Contato</a>
    </nav>
</header>

<main>
    <section>
        <h2>Nossos Produtos</h2>

        <div class="grid-imagens">
            <div class="card-produto">
                <img src="img/imgração.jpg" alt="Ração Premium">
                <h3>Ração Premium</h3>
                <p>Ração de alta qualidade para seu pet.</p>
                <button class="btn-compra">Comprar</button>
            </div>

            <div class="card-produto">
                <img src="img/brinquedo.jpg" alt="Brinquedos">
                <h3>Brinquedos</h3>
                <p>Diversão garantida para cães e gatos.</p>
                <button class="btn-compra">Comprar</button>
            </div>

            <div class="card-produto">
                <img src="img/acessorios.jpg" alt="Acessórios">
                <h3>Acessórios</h3>
                <p>Conforto e estilo para seu pet.</p>
                <button class="btn-compra">Comprar</button>
            </div>
        </div>
